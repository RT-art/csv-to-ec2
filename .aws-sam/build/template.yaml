AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Serverless application to process CSV files and launch EC2 instances
  based on the data.

  '
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${AWS::StackName}-VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${AWS::StackName}-IGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: VPC
      InternetGatewayId:
        Ref: InternetGateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${AWS::StackName}-PublicSubnet
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VPC
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${AWS::StackName}-RouteTable
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId:
        Ref: RouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId:
        Ref: InternetGateway
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: PublicSubnet
      RouteTableId:
        Ref: RouteTable
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${AWS::StackName}-EC2InstanceRole
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
      - Ref: EC2InstanceRole
  CsvFileBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: csv-to-ec2-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  CsvToEc2Function:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.12
      CodeUri: CsvToEc2Function
      Timeout: 60
      Environment:
        Variables:
          TARGET_SUBNET_ID:
            Ref: PublicSubnet
          SSM_INSTANCE_PROFILE_ARN:
            Fn::GetAtt:
            - EC2InstanceProfile
            - Arn
          AWS_STACK_NAME:
            Ref: AWS::StackName
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - ec2:RunInstances
          - ec2:CreateTags
          Resource: '*'
        - Effect: Allow
          Action: iam:PassRole
          Resource:
            Fn::GetAtt:
            - EC2InstanceRole
            - Arn
      Events:
        S3CsvUpload:
          Type: S3
          Properties:
            Bucket:
              Ref: CsvFileBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                - Name: suffix
                  Value: .csv
    Metadata:
      SamResourceId: CsvToEc2Function
  S3ReadPolicyForLambda:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName:
        Fn::Sub: ${AWS::StackName}-S3ReadPolicyForLambda
      Roles:
      - Ref: CsvToEc2FunctionRole
      PolicyDocument:
        Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${CsvFileBucket}/*
Outputs:
  S3BucketName:
    Value:
      Ref: CsvFileBucket
  VpcId:
    Value:
      Ref: VPC
  PublicSubnetId:
    Value:
      Ref: PublicSubnet
